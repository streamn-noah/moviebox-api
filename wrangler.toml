name = "moviebox-worker"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# Set MOVIEBOX_SECRET via: wrangler secret put MOVIEBOX_SECRET
# This must match MOVIEBOX_WORKER_SECRET in your D.Verse backend env

[[routes]]
# Update with your actual Cloudflare zone if using custom domain
# pattern = "moviebox.yourdomain.com/*"
# zone_name = "yourdomain.com"
